<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>致亲爱的你</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: #0A0A12;
      font-family: 'Noto Serif SC', serif;
      overflow-x: hidden;
      color: #E0D9D1;
    }

    /* Canvas */
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* 下雨画布 */
    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* 太阳光画布 */
    #sunny-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* 主容器 */
    .main-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
    }

    /* 第一页：启动页 - 大雨效果 */
    .intro-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background: #0A0A12;
    }

    .intro-text {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 2px;
      line-height: 2;
      color: #E0D9D1;
      margin-bottom: 80px;
      text-shadow: 0 0 30px 10px rgba(0,0,0,0.3);
    }

    .intro-btn {
      padding: 18px 60px;
      width: 280px;
      height: 60px;
      background: transparent;
      border: 1px solid #F8C3A9;
      color: #F8C3A9;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Serif SC', sans-serif;
      border-radius: 0;
    }

    .intro-btn:hover {
      background: rgba(248, 195, 169, 0.1);
      box-shadow: inset 0 0 8px rgba(248, 195, 169, 0.2);
    }

    /* 主页 - 天晴效果 */
    .main-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a7c59 0%, #7c947a 100%, #a8e6cf 100%);
      display: none;
      opacity: 0;
      transition: opacity 1s;
    }

    .main-page.show {
      display: flex;
      opacity: 1;
    }

    .main-content {
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }

    .main-title {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 2px;
      line-height: 2;
      color: #E0D9D1;
      margin-bottom: 80px;
      text-shadow: 0 0 30px 10px rgba(0,0,0,0.3);
    }

    .main-btn {
      padding: 18px 60px;
      width: 280px;
      height: 60px;
      background: transparent;
      border: 1px solid #F8C3A9;
      color: #F8C3A9;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Serif SC', sans-serif;
      border-radius: 0;
    }

    .main-btn:hover {
      background: rgba(248, 195, 169, 0.1);
      box-shadow: inset 0 0 8px rgba(248, 195, 169, 0.2);
    }

    /* 太阳效果 */
    .sun {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%, -50%);
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.8), rgba(255, 180, 0, 0.3));
      border-radius: 50%;
      box-shadow: 0 0 30px 20px rgba(255, 215, 0, 0.4);
      z-index: 0;
    }

    .sun-ray {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: top center;
      transform: translateX(-50%, -50%);
    }

    .sun-ray::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 80px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), transparent);
      transform-origin: top center;
      transform: translateX(-50%, -50%);
    }

    /* 下雨动画 */
    .raindrop {
      position: absolute;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(174, 194, 224, 0.6), rgba(174, 194, 224, 0.1));
      animation: rain linear infinite;
    }

    @keyframes rain {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(100vh);
        opacity: 0.3;
      }
    }

    /* 淡入效果 */
    .fade-in {
      animation: fadeIn 1.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .intro-text { font-size: 24px; }
      .intro-btn, .main-btn { width: 240px; height: 56px; font-size: 18px; }
      .sun { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>
  <!-- 下雨画布 -->
  <div id="rain-canvas"></div>

  <!-- 第一页：启动页 -->
  <div class="intro-page" id="introPage">
    <div class="intro-text">有些人，光是遇见，就已经很美好了</div>
    <button class="intro-btn" onclick="goToMain()">轻触开启</button>
  </div>

  <!-- 第二页：主页面 - 天晴效果 -->
  <div class="main-page" id="mainPage">
    <div class="main-content">
      <h1 class="main-title">致亲爱的你</h1>
      <button class="main-btn" onclick="goToFinish()">查看最后惊喜</button>
    </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- 太阳 -->
  <div class="sun" id="sun"></div>

  <script>
    // 配置
    const goldColors = ['#FFD700', '#FFA500', '#FFCC00', '#FFF8DC', '#FFDAB9', '#FFF5934'];
    const redColors = ['#FF0000', '#FF4500', '#FF6B6B', '#DC143C', '#FF2400', '#FF3C3C', '#FF5722'];

    let currentMode = 'intro';
    let canvas, ctx;
    let particles = [];
    let raindrops = [];
    let sunRays = [];

    function initCanvas() {
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    // ========== 烟花类 ==========
    class Firework {
      constructor(sx, sy, tx, ty, color) {
        this.x = sx;
        this.y = sy;
        this.sx = sx;
        this.sy = sy;
        this.tx = tx;
        this.ty = ty;
        
        this.distanceToTarget = Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2));
        this.distanceTraveled = 0;
        
        this.coordinates = [];
        this.coordinateCount = 5;
        
        while (this.coordinateCount--) {
          this.coordinates.push([this.x, this.y]);
        }
        
        this.angle = Math.atan2(ty - sy, tx - sx);
        this.speed = 3;
        this.acceleration = 1.03;
        this.color = color;
        this.hasExploded = false;
      }

      update(index) {
        this.coordinates.pop();
        this.coordinates.unshift([this.x, this.y]);
        
        this.speed *= this.acceleration;
        
        var vx = Math.cos(this.angle) * this.speed;
        var vy = Math.sin(this.angle) * this.speed;
        
        this.distanceTraveled = Math.sqrt(Math.pow(this.x - this.sx, 2) + Math.pow(this.y - this.sy, 2));
        
        if (this.distanceTraveled >= this.distanceToTarget) {
          if (!this.hasExploded) {
            createExplosion(this.tx, this.ty, true);
            this.hasExploded = true;
            fireworks.splice(index, 1);
          } else {
            fireworks.splice(index, 1);
          }
        } else {
          this.x += vx;
          this.y += vy;
        }
      }

      draw() {
        ctx.beginPath();
        ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
        ctx.lineTo(this.x, this.y);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }

    // 爆炸粒子类
    class Particle {
      constructor(x, y, color, type) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.type = type || 'normal';
        
        this.coordinates = [];
        this.coordinateCount = 6;
        
        while (this.coordinateCount--) {
          this.coordinates.push([this.x, this.y]);
        }
        
        this.angle = Math.random() * Math.PI * 2;
        
        // 金色和红色粒子更大、更亮
        if (color.includes('FF')) {
          this.speed = 3 + Math.random() * 3;
          this.size = 2 + Math.random() * 2;
        } else {
          this.speed = 2 + Math.random() * 2;
          this.size = 1.5 + Math.random() * 2;
        }
        
        this.friction = 0.97;
        this.gravity = 0.8;
        this.decay = 0.012 + Math.random() * 0.008;
        this.alpha = 1;
        this.hasTrail = true;
      }

      update(index) {
        this.coordinates.pop();
        this.coordinates.unshift([this.x, this.y]);
        
        this.speed *= this.friction;
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
        
        this.vy += this.gravity;
        
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
        
        if (this.alpha <= this.decay) {
          particles.splice(index, 1);
        }
      }

      draw() {
        if (this.hasTrail && this.coordinates.length > 2) {
          for (var i = 0; i < this.coordinates.length; i++) {
            var alpha = (i / this.coordinates.length) * (this.alpha * 0.8);
            ctx.beginPath();
            ctx.moveTo(this.coordinates[i][0], this.coordinates[i][1]);
            ctx.lineTo(this.coordinates[i + 1][0], this.coordinates[i + 1][1]);
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = alpha * 0.5;
            ctx.lineWidth = this.size * 0.5;
            ctx.lineCap = 'round';
            ctx.stroke();
          }
        }
        
        // 粒子主体
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha;
        ctx.fill();
        
        // 光晕
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha * 0.3;
        ctx.fill();
        
        ctx.globalAlpha = 1;
      }

      isAlive() {
        return this.alpha > 0;
      }
    }

    // 创建爆炸 - 只有金色和红色
    function createExplosion(x, y, isBig) {
      var particleCount = isBig ? 150 : 80;
      
      // 只用金色和红色
      var useGold = Math.random() > 0.3;
      var color = useGold ? 
        goldColors[Math.floor(Math.random() * goldColors.length)] : 
        redColors[Math.floor(Math.random() * redColors.length)];
      
      for (var i = 0; i < particleCount; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // 创建满屏烟花 - 只有金色和红色
    function createBigFireworks() {
      var totalWaves = 8;
      var perWave = 10;
      
      for (var wave = 0; wave < totalWaves; wave++) {
        (function(w) {
          setTimeout(function() {
            for (var i = 0; i < perWave; i++) {
              setTimeout(function() {
                var sx = Math.random() * canvas.width;
                var tx = canvas.width * 0.1 + Math.random() * canvas.width * 0.8;
                var ty = canvas.height * 0.1 + Math.random() * canvas.height * 0.4;
                
                var useGold = Math.random() > 0.4;
                var color = useGold ? 
                  goldColors[Math.floor(Math.random() * goldColors.length)] : 
                  redColors[Math.floor(Math.random() * redColors.length)];
                
                var fw = new Firework(sx, canvas.height, tx, ty, color);
                fireworks.push(fw);
              }, i * 50);
            }
          }, w * 200);
        })(wave);
      }
    }

    // 初始化
    function init() {
      resizeCanvas();
      // 创建雨滴
      for (var i = 0; i < 300; i++) {
        var drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDelay = Math.random() * 5 + 's';
        drop.style.animationDuration = (2 + Math.random() * 3) + 's';
        drop.style.opacity = 0.4 + Math.random() * 0.4;
        document.getElementById('rain-canvas').appendChild(drop);
      }
    }

    // 动画循环
    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      var i = fireworks.length;
      while (i--) {
        fireworks[i].draw();
        fireworks[i].update(i);
      }
      
      var j = particles.length;
      while (j--) {
        particles[j].draw();
        particles[j].update(j);
      }
      
      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
