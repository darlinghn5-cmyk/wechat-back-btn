<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信返回按钮演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ededed;
      min-height: 100vh;
    }
    
    /* 模拟微信顶部导航栏 */
    .wechat-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #ededed;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #d9d9d9;
      z-index: 100;
    }
    
    /* 返回按钮 */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      padding: 8px 12px 8px 4px;
      cursor: pointer;
      font-size: 17px;
      color: #000;
      transition: opacity 0.2s;
    }
    
    .back-btn:hover {
      opacity: 0.7;
    }
    
    .back-btn:active {
      opacity: 0.5;
    }
    
    /* 返回箭头 */
    .back-arrow {
      width: 12px;
      height: 12px;
      border-left: 2.5px solid #000;
      border-bottom: 2.5px solid #000;
      transform: rotate(45deg);
    }
    
    /* 页面标题 */
    .page-title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin-right: 60px;
    }
    
    /* 内容区域 */
    .content {
      padding: 72px 16px 24px;
    }
    
    /* 消息气泡容器 */
    .message-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    /* 消息气泡 */
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* 发送的消息（右侧绿色） */
    .message.sent {
      background: #95ec69;
      align-self: flex-end;
    }
    
    /* 接收的消息（左侧白色） */
    .message.received {
      background: #fff;
      align-self: flex-start;
    }
    
    /* 提示文字 */
    .hint {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 32px;
      padding: 16px;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
    }
    
    /* 点击效果提示 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
    }
    
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- 微信风格顶部导航 -->
  <div class="wechat-header">
    <button class="back-btn" onclick="goBack()">
      <div class="back-arrow"></div>
      <span>返回</span>
    </button>
    <div class="page-title">聊天详情</div>
  </div>
  
  <!-- 内容区域 -->
  <div class="content">
    <div class="message-container" id="messages">
      <div class="message received">点击左上角的返回按钮试试</div>
      <div class="message sent">好的，我来点一下</div>
    </div>
    
    <div class="hint">
      点击返回按钮后会添加一条新消息
    </div>
  </div>
  
  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>
  
  <script>
    // 返回按钮点击事件
    function goBack() {
      // 显示提示
      showToast('已点击返回按钮');
      
      // 添加一条新消息
      addMessage('你点击了返回按钮，这是自动生成的消息！', 'sent');
      
      // 模拟延迟后添加回复
      setTimeout(() => {
        addMessage('收到！返回按钮功能正常 ✅', 'received');
      }, 800);
    }
    
    // 添加消息
    function addMessage(text, type) {
      const container = document.getElementById('messages');
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      container.appendChild(msg);
      
      // 滚动到最新消息
      msg.scrollIntoView({ behavior: 'smooth' });
    }
    
    // 显示 Toast
    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
