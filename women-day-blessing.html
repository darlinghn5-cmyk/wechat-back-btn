<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送给那个傻乎乎的女孩</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Long+Cang&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            background: #0f0f1a;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 首页 - 夜雨 */
        .page-rain {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
        }

        .rain-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .mist {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(30, 40, 60, 0.4), transparent);
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px;
            max-width: 560px;
        }

        /* 艺术字标题 */
        .title {
            font-family: 'Long Cang', cursive;
            font-size: 2.4em;
            font-weight: 400;
            color: #e8e4df;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            animation: fadeInUp 1.2s ease;
            text-shadow: 0 0 30px rgba(255,255,255,0.15);
        }

        .title-inline {
            display: inline;
        }

        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1em;
            font-weight: 300;
            color: #b8b5b0;
            margin-bottom: 50px;
            line-height: 2.6;
            letter-spacing: 0.25em;
            animation: fadeInUp 1.5s ease;
        }

        .next-btn {
            padding: 14px 45px;
            font-size: 1em;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.15em;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            color: #d1d5db;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.5s ease;
            animation: fadeInUp 1.8s ease;
            backdrop-filter: blur(10px);
        }

        .next-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        /* 第二页 - 破晓 */
        .page-dawn {
            background: linear-gradient(180deg, #2d3436 0%, #636e72 30%, #fab1a0 70%, #ffeaa7 100%);
        }

        .sun-glow {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,236,179,0.8) 0%, rgba(253,203,110,0.4) 40%, transparent 70%);
            border-radius: 50%;
            animation: sunRise 3s ease-out forwards;
            z-index: 1;
        }

        @keyframes sunRise {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .light-rays {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(255,236,179,0.3), transparent);
            z-index: 0;
            animation: fadeIn 2s ease 1s forwards;
            opacity: 0;
        }

        .dawn-content .title {
            color: #2d3436;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .dawn-content .subtitle {
            color: #3d4852;
        }

        .dawn-content .next-btn {
            border-color: rgba(45,52,56,0.3);
            color: #2d3436;
        }

        .dawn-content .next-btn:hover {
            background: rgba(45,52,56,0.15);
        }

        /* 第三页 - 暖阳 */
        .page-warm {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .warm-content .title {
            color: #5d4e37;
        }

        .warm-content .message {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05em;
            font-weight: 300;
            line-height: 2.8;
            margin-bottom: 40px;
            color: #6b5b4e;
            letter-spacing: 0.2em;
        }

        .warm-content .highlight {
            color: #8b6b5a;
            font-weight: 400;
        }

        .divider {
            width: 50px;
            height: 1px;
            background: rgba(107,91,78,0.35);
            margin: 25px auto;
        }

        /* 第四页 - 星空烟花 */
        .page-final {
            background: linear-gradient(180deg, #0c0c1e 0%, #1a1a2e 50%, #16213e 100%);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .firework-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .final-content {
            z-index: 10;
        }

        .final-content .title {
            font-size: 1.6em;
            color: #e8d5b7;
        }

        .final-message {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1em;
            color: #c9b896;
            letter-spacing: 0.2em;
            margin-bottom: 30px;
            line-height: 2.4;
        }

        .heart-icon {
            display: inline-block;
            font-size: 1.2em;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 页面指示器 */
        .page-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .dot.active {
            background: rgba(255,216,155,0.9);
            box-shadow: 0 0 15px rgba(255,216,155,0.5);
        }

        /* 黑胶唱片音乐按钮 */
        .music-btn-inline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            margin-left: 12px;
            margin-top: 8px;
            border: none;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            vertical-align: middle;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .music-btn-inline:hover {
            transform: scale(1.05);
        }

        /* 黑胶唱片纹路 */
        .music-btn-inline::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 2px,
                rgba(255,255,255,0.05) 2px,
                rgba(255,255,255,0.05) 3px
            );
            top: 0;
            left: 0;
        }

        /* 中心标签 */
        .music-btn-inline::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #c9a86c, #8b7355);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
        }

        /* 中心小孔 */
        .vinyl-hole {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .music-btn-inline.playing {
            animation: vinylSpin 2s linear infinite;
        }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 挥手动画 */
        .wave {
            display: inline-block;
            animation: wave 0.8s ease-in-out infinite;
            transform-origin: 70% 70%;
        }

        @keyframes wave {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(14deg); }
            30% { transform: rotate(-8deg); }
            45% { transform: rotate(14deg); }
            60% { transform: rotate(-4deg); }
            75% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }

        /* 互动页面样式 */
        .page-intro {
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
        }

        .intro-text {
            font-family: 'Long Cang', cursive;
            font-size: 2em;
            color: #e8e4df;
            letter-spacing: 0.15em;
            animation: fadeInUp 1.2s ease;
        }

        .intro-btn {
            position: absolute;
            padding: 16px 50px;
            font-size: 1.1em;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.2em;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #e8e4df;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInUp 1.5s ease;
            z-index: 10;
        }

        .intro-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        /* 按钮跳动动画 */
        @keyframes buttonJump {
            0% { transform: translate(0, 0); }
            25% { transform: translate(var(--jumpX1), var(--jumpY1)); }
            50% { transform: translate(var(--jumpX2), var(--jumpY2)); }
            75% { transform: translate(var(--jumpX3), var(--jumpY3)); }
            100% { transform: translate(0, 0); }
        }

        .btn-jump {
            animation: buttonJump 4s ease-in-out infinite;
        }

        /* 萤火虫光点 */
        .firefly {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #fff 0%, #ffd700 40%, transparent 70%);
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 20px 8px rgba(255, 215, 0, 0.6);
            animation: fireflyGlow 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .firefly:hover {
            transform: scale(1.2);
        }

        @keyframes fireflyGlow {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 25px 10px rgba(255, 215, 0, 0.8); }
        }

        .firefly-text {
            font-family: 'Long Cang', cursive;
            font-size: 1.6em;
            color: #e8e4df;
            letter-spacing: 0.12em;
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            animation: fadeInUp 1s ease;
        }

        /* 光点炸开动画 */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff 0%, #ffd700 50%, transparent 100%);
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
            animation: sparkleFloat 3s ease-out forwards;
        }

        @keyframes sparkleFloat {
            0% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* 渐亮效果 */
        .fade-in-light {
            animation: fadeInLight 2s ease-in forwards;
        }

        @keyframes fadeInLight {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 页面变亮 */
        .page-brighten {
            animation: brighten 3s ease-in forwards;
        }

        @keyframes brighten {
            0% { background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%); }
            100% { background: linear-gradient(180deg, #1a1a2e 0%, #2d3436 50%, #1a1a2e 100%); }
        }

        /* 非常淡的心形 */
        .faint-heart {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 1.5em;
            color: rgba(255,255,255,0.03);
            z-index: 15;
            user-select: none;
        }

        /* 画卷展开效果 */
        .scroll-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 1;
        }

        .scroll-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 画卷内容从中间向两边展开 */
        .scroll-content {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 100%;
            overflow: hidden;
            transition: width 2s ease-out;
        }

        .scroll-container.active .scroll-content {
            width: 100%;
        }

        .scroll-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        .scroll-container.active .scroll-page {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 互动页面1 -->
    <div class="page page-intro active" id="page1">
        <p class="intro-text">送你一份礼物</p>
        <button class="intro-btn btn-jump" id="btn1" onclick="goToPage(2)">点击</button>
    </div>

    <!-- 互动页面2 -->
    <div class="page page-intro" id="page2">
        <p class="intro-text">点击一下</p>
        <button class="intro-btn btn-jump" id="btn2" onclick="goToPage(3)">点击</button>
    </div>

    <!-- 互动页面3 -->
    <div class="page page-intro" id="page3">
        <p class="intro-text">再点一下</p>
        <button class="intro-btn btn-jump" id="btn3" onclick="goToPage(4)">点击</button>
    </div>

    <!-- 互动页面4 -->
    <div class="page page-intro" id="page4">
        <p class="intro-text">还没到底</p>
        <button class="intro-btn btn-jump" id="btn4" onclick="goToPage(5)">点击</button>
    </div>

    <!-- 互动页面5 -->
    <div class="page page-intro" id="page5">
        <p class="intro-text">你猜我要干嘛？</p>
        <button class="intro-btn btn-jump" id="btn5" onclick="goToPage(6)">点击</button>
    </div>

    <!-- 互动页面6 -->
    <div class="page page-intro" id="page6">
        <p class="intro-text">不逗你了，下一个就是</p>
        <button class="intro-btn btn-jump" id="btn6" onclick="goToPage(7)">点击</button>
    </div>

    <!-- 萤火虫页面1 -->
    <div class="page page-intro" id="page7">
        <p class="firefly-text">抓到它，才能看礼物</p>
        <div class="firefly" id="firefly1" onclick="catchFirefly1(event)"></div>
    </div>

    <!-- 萤火虫页面2 -->
    <div class="page page-intro" id="page8">
        <p class="firefly-text">哎呀，跑了<br><br>再抓一次</p>
        <div id="sparkles"></div>
    </div>

    <!-- 萤火虫页面3 -->
    <div class="page page-intro" id="page9">
        <p class="firefly-text">算了，不抓了<br><br>光自己跑来了</p>
        <div id="finalSparkles"></div>
    </div>

    <!-- 第十页 - 夜雨（原第一页） -->
    <div class="page page-rain" id="page10">
        <canvas class="rain-canvas" id="rainCanvas"></canvas>
        <div class="mist"></div>
        <div class="content-box">
            <h1 class="title">
                <span class="title-inline">送给那个傻乎乎的女孩</span>
                <button class="music-btn-inline" id="musicBtn" onclick="toggleMusic()">
                    <span class="vinyl-hole"></span>
                </button>
            </h1>
            <p class="subtitle">
                长夜未央<br>
                有人提灯<br>
                立在回廊
            </p>
            <button class="next-btn" onclick="goToPage(11)">且看 <span class="wave">👋</span></button>
        </div>
    </div>

    <!-- 第十一页 - 破晓（原第二页） -->
    <div class="page page-dawn" id="page11">
        <div class="light-rays"></div>
        <div class="sun-glow"></div>
        <div class="content-box dawn-content">
            <p class="subtitle">
                长夜将尽<br>
                天光在望<br><br>
                你所承之重<br>
                星月知<br>
                风露知
            </p>
            <button class="next-btn" onclick="goToPage(12)">且看 <span class="wave">👋</span></button>
        </div>
    </div>

    <!-- 第十二页 - 暖阳（原第三页） -->
    <div class="page page-warm" id="page12">
        <div class="floating-particles" id="particles"></div>
        <div class="content-box warm-content">
            <h1 class="title">欲与君言</h1>
            <div class="divider"></div>
            <div class="message">
                <p>这一路</p>
                <p></p>
                <p>山也过，水也过</p>
                <p></p>
                <p>霜雪满肩</p>
                <p></p>
                <p>都不说</p>
                <div class="divider"></div>
                <p>可你看</p>
                <p></p>
                <p>风会散，雨会收</p>
                <p></p>
                <p>云开处</p>
                <p></p>
                <p>月自明</p>
                <div class="divider"></div>
                <p>回眸</p>
                <p>有灯有影</p>
                <p><span class="highlight">长明</span></p>
            </div>
            <button class="next-btn" onclick="goToPage(13)">且看 <span class="wave">👋</span></button>
        </div>

    <!-- 第十三页 - 星空烟花（原第四页） -->

        <div class="stars" id="stars"></div>
        <canvas class="firework-canvas" id="fireworkCanvas"></canvas>
        <div class="content-box final-content">
            <p class="final-message">
                愿往后<br>
                天地温柔<br><br>
                愿你所见<br>
                皆有光<br><br>
                抬眼处<br>
                总有清辉相照
            </p>
        </div>
        <div class="faint-heart">❤️</div>
    </div>

    <!-- 页面指示器 -->
    <div class="page-indicator">
        <div class="dot active" onclick="goToPage(1)"></div>
        <div class="dot" onclick="goToPage(2)"></div>
        <div class="dot" onclick="goToPage(3)"></div>
        <div class="dot" onclick="goToPage(4)"></div>
        <div class="dot" onclick="goToPage(5)"></div>
        <div class="dot" onclick="goToPage(6)"></div>
        <div class="dot" onclick="goToPage(7)"></div>
        <div class="dot" onclick="goToPage(8)"></div>
        <div class="dot" onclick="goToPage(9)"></div>
        <div class="dot" onclick="goToPage(10)"></div>
        <div class="dot" onclick="goToPage(11)"></div>
        <div class="dot" onclick="goToPage(12)"></div>
        <div class="dot" onclick="goToPage(13)"></div>
    </div>

    <!-- 背景音乐 - 浮光 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="浮光 (The History) - Jannik.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 烟花爆炸音效 -->
    <audio id="fireworkSound" preload="auto">
        <source src="https://cdn.freesound.org/previews/170/170240_2394245-lq.mp3" type="audio/mpeg">
    </audio>

    <script>
        let currentPage = 1;
        let scrollTimeout = null;

        // 初始化按钮随机位置和跳动
        function initButtonJump(btnId) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            // 随机初始位置
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 200;
            const initX = Math.random() * maxX * 0.6 + maxX * 0.2;
            const initY = Math.random() * maxY * 0.5 + maxY * 0.3;
            btn.style.left = initX + 'px';
            btn.style.top = initY + 'px';
            
            // 设置随机跳动参数
            const jumpRange = 80;
            btn.style.setProperty('--jumpX1', (Math.random() - 0.5) * jumpRange + 'px');
            btn.style.setProperty('--jumpY1', (Math.random() - 0.5) * jumpRange + 'px');
            btn.style.setProperty('--jumpX2', (Math.random() - 0.5) * jumpRange + 'px');
            btn.style.setProperty('--jumpY2', (Math.random() - 0.5) * jumpRange + 'px');
            btn.style.setProperty('--jumpX3', (Math.random() - 0.5) * jumpRange + 'px');
            btn.style.setProperty('--jumpY3', (Math.random() - 0.5) * jumpRange + 'px');
        }

        // 初始化所有按钮
        function initAllButtons() {
            for (let i = 1; i <= 6; i++) {
                initButtonJump('btn' + i);
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', initAllButtons);
        window.addEventListener('resize', initAllButtons);

        function goToPage(pageNum) {
            // 清除自动滚动的定时器
            if (scrollTimeout) {
                clearTimeout(scrollTimeout);
                scrollTimeout = null;
            }
            
            document.getElementById('page' + currentPage).classList.remove('active');
            document.getElementById('page' + pageNum).classList.add('active');
            document.querySelectorAll('.dot')[currentPage - 1].classList.remove('active');
            document.querySelectorAll('.dot')[pageNum - 1].classList.add('active');
            currentPage = pageNum;

            if (pageNum === 13) {
                createStars();
                startFireworks();
            }
            if (pageNum === 12) {
                createParticles();
            }
            if (pageNum === 7) {
                startFirefly();
                // 从第7页开始播放音乐
                if (!musicPlaying) {
                    bgMusic.play().then(() => {
                        musicPlaying = true;
                        musicBtn.classList.add('playing');
                    }).catch(() => {});
                }
            }
            if (pageNum === 8) {
                createSparkles();
            }
            if (pageNum === 9) {
                createFinalSparkles();
            }
            
            // 第10-12页自动滚动到下一页
            if (pageNum === 10) {
                scrollTimeout = setTimeout(() => goToPage(11), 5000);
            } else if (pageNum === 11) {
                scrollTimeout = setTimeout(() => goToPage(12), 6000);
            } else if (pageNum === 12) {
                scrollTimeout = setTimeout(() => goToPage(13), 7000);
            }
        }

        // ========== 下雨效果 ==========
        const rainCanvas = document.getElementById('rainCanvas');
        const rainCtx = rainCanvas.getContext('2d');

        function resizeRainCanvas() {
            rainCanvas.width = window.innerWidth;
            rainCanvas.height = window.innerHeight;
        }
        resizeRainCanvas();
        window.addEventListener('resize', resizeRainCanvas);

        class RainDrop {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * rainCanvas.width;
                this.y = Math.random() * -rainCanvas.height;
                this.length = Math.random() * 25 + 15;
                this.speed = Math.random() * 12 + 10;
                this.opacity = Math.random() * 0.25 + 0.1;
                this.width = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += 1;
                if (this.y > rainCanvas.height) this.reset();
            }
            draw() {
                rainCtx.beginPath();
                rainCtx.moveTo(this.x, this.y);
                rainCtx.lineTo(this.x + 2, this.y + this.length);
                rainCtx.strokeStyle = `rgba(180, 190, 210, ${this.opacity})`;
                rainCtx.lineWidth = this.width;
                rainCtx.lineCap = 'round';
                rainCtx.stroke();
            }
        }

        const rainDrops = [];
        for (let i = 0; i < 150; i++) {
            rainDrops.push(new RainDrop());
        }

        function animateRain() {
            rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
            rainDrops.forEach(drop => {
                drop.update();
                drop.draw();
            });
            requestAnimationFrame(animateRain);
        }
        animateRain();

        // ========== 漂浮粒子 ==========
        function createParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-10px';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // ========== 星空 ==========
        function createStars() {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.width = (Math.random() * 2 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // ========== 烟花效果（高性能锐化版） ==========
        const fireworkCanvas = document.getElementById('fireworkCanvas');
        const fwCtx = fireworkCanvas.getContext('2d');

        function resizeFireworkCanvas() {
            fireworkCanvas.width = window.innerWidth;
            fireworkCanvas.height = window.innerHeight;
        }
        resizeFireworkCanvas();
        window.addEventListener('resize', resizeFireworkCanvas);

        const colorPalettes = {
            gold: ['#FFD700', '#FFA500', '#FFB347', '#FFE135', '#FFCC00'],
            red: ['#FF0000', '#FF4500', '#DC143C', '#FF3333', '#FF1744'],
            purple: ['#9C27B0', '#BA68C8', '#CE93D8', '#7B1FA2', '#E040FB']
        };

        function getRandomPalette() {
            const palettes = ['gold', 'red', 'purple'];
            return palettes[Math.floor(Math.random() * palettes.length)];
        }

        function getRandomColor(palette) {
            const colors = colorPalettes[palette];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        class FastParticle {
            constructor(x, y, angle, speed, color) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.gravity = 0.06;
                this.size = 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.fillStyle = this.color;
                fwCtx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }

        class BeamParticle {
            constructor(x, y, angle, speed, color, length) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.008;
                this.gravity = 0.05;
                this.length = length;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.strokeStyle = this.color;
                fwCtx.lineWidth = 2;
                fwCtx.lineCap = 'round';
                fwCtx.beginPath();
                fwCtx.moveTo(this.x, this.y);
                const endX = this.x - this.vx * this.length;
                const endY = this.y - this.vy * this.length;
                fwCtx.lineTo(endX, endY);
                fwCtx.stroke();
            }
        }

        class SparkParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 1 + 0.5;
                this.color = color;
                this.alpha = 0.8;
                this.decay = Math.random() * 0.008 + 0.004;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.02;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.fillStyle = this.color;
                fwCtx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * fireworkCanvas.width * 0.7 + fireworkCanvas.width * 0.15;
                this.startX = this.x; // 记录起始位置，保持竖直
                this.y = fireworkCanvas.height;
                this.targetY = Math.random() * (fireworkCanvas.height * 0.4) + fireworkCanvas.height * 0.1;
                this.speed = Math.random() * 4 + 8;
                this.palette = getRandomPalette();
                this.color = getRandomColor(this.palette);
                this.exploded = false;
                this.particles = [];
                this.sparks = [];
                this.trail = [];
                this.type = Math.floor(Math.random() * 5);
            }

            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    this.x = this.startX; // 保持竖直
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > 15) this.trail.shift();
                    if (this.y <= this.targetY) this.explode();
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].alpha <= 0) this.particles.splice(i, 1);
                }

                for (let i = this.sparks.length - 1; i >= 0; i--) {
                    this.sparks[i].update();
                    if (this.sparks[i].alpha <= 0) this.sparks.splice(i, 1);
                }
            }

            explode() {
                this.exploded = true;
                playFireworkSound(); // 播放爆炸音效
                const count = 120 + Math.floor(Math.random() * 60); // 增加粒子数量

                switch(this.type) {
                    case 0:
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = Math.random() * 5 + 4;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 4));
                        }
                        break;
                    case 1:
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 5 + Math.random();
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 5));
                        }
                        for (let i = 0; i < 30; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const speed = Math.random() * 2;
                            this.particles.push(new FastParticle(this.x, this.y, angle, speed, '#FFFFFF'));
                        }
                        break;
                    case 2:
                        for (let i = 0; i < count * 1.5; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 3 + Math.random() * 4;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 6));
                        }
                        break;
                    case 3:
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 4 + Math.random() * 2;
                            this.particles.push(new FastParticle(this.x, this.y, angle, speed, getRandomColor(this.palette)));
                        }
                        setTimeout(() => {
                            for (let i = 0; i < count * 0.6; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const speed = Math.random() * 3 + 1;
                                this.particles.push(new FastParticle(this.x, this.y, angle, speed, getRandomColor(this.palette)));
                            }
                            playFireworkSound(); // 第二层爆炸音效
                        }, 100);
                        break;
                    case 4:
                        const arms = 5 + Math.floor(Math.random() * 3);
                        for (let i = 0; i < count * 2; i++) {
                            const arm = i % arms;
                            const angle = (Math.PI * 2 / arms) * arm + (Math.random() - 0.5) * 0.3;
                            const speed = 3 + Math.random() * 5;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 5));
                        }
                        break;
                }

                for (let i = 0; i < 50; i++) { // 增加余烬数量
                    this.sparks.push(new SparkParticle(this.x, this.y, getRandomColor(this.palette)));
                }
            }

            draw() {
                if (!this.exploded) {
                    // 绘制竖直尾迹
                    fwCtx.globalAlpha = 0.9;
                    fwCtx.strokeStyle = this.color;
                    fwCtx.lineWidth = 2;
                    fwCtx.beginPath();
                    for (let i = 1; i < this.trail.length; i++) {
                        fwCtx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
                        fwCtx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    fwCtx.stroke();

                    fwCtx.globalAlpha = 1;
                    fwCtx.fillStyle = '#FFFFFF';
                    fwCtx.fillRect(this.x - 2, this.y - 2, 4, 4);
                }

                this.particles.forEach(p => p.draw());
                this.sparks.forEach(s => s.draw());
            }

            isDone() {
                return this.exploded && this.particles.length === 0 && this.sparks.length === 0;
            }
        }

        let fireworks = [];
        let fireworkInterval = null;
        let animationId = null;

        // 播放烟花爆炸音效
        function playFireworkSound() {
            const sound = document.getElementById('fireworkSound');
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.3;
                sound.play().catch(() => {});
            }
        }

        function startFireworks() {
            fireworks = [];
            if (animationId) cancelAnimationFrame(animationId);
            if (fireworkInterval) clearInterval(fireworkInterval);

            // 初始爆发更多烟花
            for (let i = 0; i < 6; i++) {
                setTimeout(() => fireworks.push(new Firework()), i * 150);
            }

            // 更密集地发射
            fireworkInterval = setInterval(() => {
                if (fireworks.length < 12) { // 增加同时存在的烟花数量
                    fireworks.push(new Firework());
                }
            }, 250); // 缩短发射间隔

            animateFireworks();
        }

        function animateFireworks() {
            fwCtx.globalAlpha = 0.15;
            fwCtx.fillStyle = '#0c0c1e';
            fwCtx.fillRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);
            fwCtx.globalAlpha = 1;

            fireworks.forEach(fw => {
                fw.update();
                fw.draw();
            });

            fireworks = fireworks.filter(fw => !fw.isDone());
            animationId = requestAnimationFrame(animateFireworks);
        }

        // ========== 音乐控制 ==========
        let musicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play().catch(e => console.log('音乐播放需要用户交互'));
                musicBtn.classList.add('playing');
            }
            musicPlaying = !musicPlaying;
        }

        // ========== 萤火虫效果 ==========
        let fireflyInterval = null;

        function startFirefly() {
            const firefly = document.getElementById('firefly1');
            if (!firefly) return;
            
            // 随机移动
            fireflyInterval = setInterval(() => {
                const x = Math.random() * (window.innerWidth - 100) + 50;
                const y = Math.random() * (window.innerHeight - 200) + 100;
                firefly.style.left = x + 'px';
                firefly.style.top = y + 'px';
            }, 1500);
            
            // 初始位置
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - 200) + 100;
            firefly.style.left = x + 'px';
            firefly.style.top = y + 'px';
        }

        function catchFirefly1(event) {
            if (fireflyInterval) clearInterval(fireflyInterval);
            goToPage(8);
        }

        function createSparkles() {
            const container = document.getElementById('sparkles');
            if (!container) return;
            container.innerHTML = '';
            
            // 创建多个小光点
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.onclick = catchSparkle2;
                
                const angle = (Math.PI * 2 / 8) * i;
                const distance = 80 + Math.random() * 50;
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                sparkle.style.left = (centerX + Math.cos(angle) * distance) + 'px';
                sparkle.style.top = (centerY + Math.sin(angle) * distance) + 'px';
                
                // 添加随机漂浮动画
                sparkle.style.animation = `sparkleFloat 3s ease-out forwards`;
                
                // 让光点缓慢移动
                setInterval(() => {
                    const currentLeft = parseFloat(sparkle.style.left) || 0;
                    const currentTop = parseFloat(sparkle.style.top) || 0;
                    sparkle.style.left = (currentLeft + (Math.random() - 0.5) * 30) + 'px';
                    sparkle.style.top = (currentTop + (Math.random() - 0.5) * 30) + 'px';
                }, 800 + i * 100);
                
                container.appendChild(sparkle);
            }
        }

        function catchSparkle2(event) {
            goToPage(9);
        }

        function createFinalSparkles() {
            const container = document.getElementById('finalSparkles');
            if (!container) return;
            container.innerHTML = '';
            
            // 创建很多小光点
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.pointerEvents = 'none';
                
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                sparkle.style.width = '8px';
                sparkle.style.height = '8px';
                
                container.appendChild(sparkle);
            }
            
            // 3秒后自动跳转到下一页
            setTimeout(() => {
                goToPage(10);
            }, 3000);
        }
    </script>
</body>
</html>
