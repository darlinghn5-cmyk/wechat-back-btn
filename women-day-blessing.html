<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送给那个傻乎乎的女孩</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            background: #0f0f1a;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 首页 - 夜雨 */
        .page-rain {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
        }

        .rain-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .mist {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(30, 40, 60, 0.4), transparent);
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px;
            max-width: 520px;
        }

        .title {
            font-size: 1.8em;
            font-weight: 400;
            color: #e8e4df;
            letter-spacing: 0.15em;
            margin-bottom: 40px;
            animation: fadeInUp 1.2s ease;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1em;
            font-weight: 300;
            color: #9ca3af;
            margin-bottom: 50px;
            line-height: 2.2;
            letter-spacing: 0.08em;
            animation: fadeInUp 1.5s ease;
        }

        .next-btn {
            padding: 14px 50px;
            font-size: 0.9em;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.2em;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #d1d5db;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.5s ease;
            animation: fadeInUp 1.8s ease;
            backdrop-filter: blur(10px);
        }

        .next-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        /* 第二页 - 破晓 */
        .page-dawn {
            background: linear-gradient(180deg, #2d3436 0%, #636e72 30%, #fab1a0 70%, #ffeaa7 100%);
        }

        .sun-glow {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,236,179,0.8) 0%, rgba(253,203,110,0.4) 40%, transparent 70%);
            border-radius: 50%;
            animation: sunRise 3s ease-out forwards;
            z-index: 1;
        }

        @keyframes sunRise {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .light-rays {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(255,236,179,0.3), transparent);
            z-index: 0;
            animation: fadeIn 2s ease 1s forwards;
            opacity: 0;
        }

        .dawn-content .title {
            color: #2d3436;
            text-shadow: 0 2px 15px rgba(255,255,255,0.3);
        }

        .dawn-content .subtitle {
            color: #4a5568;
        }

        .dawn-content .next-btn {
            border-color: rgba(45,52,56,0.3);
            color: #2d3436;
        }

        .dawn-content .next-btn:hover {
            background: rgba(45,52,56,0.1);
        }

        /* 第三页 - 暖阳 */
        .page-warm {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .warm-content .title {
            color: #5d4e37;
        }

        .warm-content .message {
            font-size: 1em;
            font-weight: 300;
            line-height: 2.5;
            margin-bottom: 40px;
            color: #6b5b4e;
            letter-spacing: 0.1em;
        }

        .warm-content .highlight {
            color: #b5838d;
            font-weight: 400;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(107,91,78,0.3);
            margin: 30px auto;
        }

        /* 第四页 - 星空烟花 */
        .page-final {
            background: linear-gradient(180deg, #0c0c1e 0%, #1a1a2e 50%, #16213e 100%);
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .firework-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .final-content {
            z-index: 10;
        }

        .final-content .title {
            font-size: 1.5em;
            background: linear-gradient(90deg, #ffd89b, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-message {
            font-size: 1.1em;
            color: #d4a574;
            letter-spacing: 0.15em;
            margin-bottom: 30px;
            line-height: 2;
        }

        .date {
            font-size: 0.85em;
            color: #8b7355;
            letter-spacing: 0.3em;
        }

        .heart-icon {
            display: inline-block;
            font-size: 1.2em;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 页面指示器 */
        .page-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .dot.active {
            background: rgba(255,216,155,0.9);
            box-shadow: 0 0 15px rgba(255,216,155,0.5);
        }

        /* 音乐控制 */
        .music-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 1.1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .music-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .music-btn.playing {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- 首页 - 夜雨 -->
    <div class="page page-rain active" id="page1">
        <canvas class="rain-canvas" id="rainCanvas"></canvas>
        <div class="mist"></div>
        <div class="content-box">
            <h1 class="title">送给那个傻乎乎的女孩</h1>
            <p class="subtitle">
                长夜未央<br>
                有人提灯<br>
                立在回廊
            </p>
            <button class="next-btn" onclick="goToPage(2)">继续</button>
        </div>
    </div>

    <!-- 第二页 - 破晓 -->
    <div class="page page-dawn" id="page2">
        <div class="light-rays"></div>
        <div class="sun-glow"></div>
        <div class="content-box dawn-content">
            <h1 class="title">黎明将至</h1>
            <p class="subtitle">
                长夜将尽<br>
                天光在望<br>
                你所承之重<br>
                星月知<br>
                风露知
            </p>
            <button class="next-btn" onclick="goToPage(3)">继续</button>
        </div>
    </div>

    <!-- 第三页 - 暖阳 -->
    <div class="page page-warm" id="page3">
        <div class="floating-particles" id="particles"></div>
        <div class="content-box warm-content">
            <h1 class="title">欲与君言</h1>
            <div class="divider"></div>
            <div class="message">
                <p>这一路</p>
                <p>山也过，水也过</p>
                <p>霜雪满肩</p>
                <p>都不说</p>
                <div class="divider"></div>
                <p>可你看</p>
                <p>风会散，雨会收</p>
                <p>云开处</p>
                <p>月自明</p>
                <div class="divider"></div>
                <p>回眸</p>
                <p>有灯</p>
                <p>有影</p>
                <p><span class="highlight">长明</span></p>
            </div>
            <button class="next-btn" onclick="goToPage(4)">送给你的</button>
        </div>
    </div>

    <!-- 第四页 - 星空烟花 -->
    <div class="page page-final" id="page4">
        <div class="stars" id="stars"></div>
        <canvas class="firework-canvas" id="fireworkCanvas"></canvas>
        <div class="content-box final-content">
            <h1 class="title">愿你被这世界温柔以待</h1>
            <p class="final-message">
                愿你的眼里总有光芒<br>
                愿你的笑容永远灿烂
            </p>
            <p class="date">3.8 妇女节快乐 <span class="heart-icon">♥</span></p>
        </div>
    </div>

    <!-- 页面指示器 -->
    <div class="page-indicator">
        <div class="dot active" onclick="goToPage(1)"></div>
        <div class="dot" onclick="goToPage(2)"></div>
        <div class="dot" onclick="goToPage(3)"></div>
        <div class="dot" onclick="goToPage(4)"></div>
    </div>

    <!-- 背景音乐 - 久石让 Summer -->
    <audio id="bgMusic" loop preload="auto">
        <!-- 酷狗音乐外链 -->
        <source src="https://webfs.tx.kugou.com/202503081130/8c7d9e0f1a2b3c4d5e6f7a8b9c0d1e2f/KG03/YPx_1ea9e88b226e4ea9b76db0c6b8b8e88b.mp3" type="audio/mpeg">
        <!-- QQ音乐外链 -->
        <source src="https://ws.stream6.qqmusic.qq.com/C400003OUlho2H7RQz.m4a?guid=0&uin=0&fromtag=66" type="audio/mp4">
        <!-- 网易云备选 -->
        <source src="https://music.163.com/song/media/outer/url?id=444269017.mp3" type="audio/mpeg">
    </audio>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪</button>

    <script>
        let currentPage = 1;

        function goToPage(pageNum) {
            document.getElementById('page' + currentPage).classList.remove('active');
            document.getElementById('page' + pageNum).classList.add('active');
            document.querySelectorAll('.dot')[currentPage - 1].classList.remove('active');
            document.querySelectorAll('.dot')[pageNum - 1].classList.add('active');
            currentPage = pageNum;

            if (pageNum === 4) {
                createStars();
                startFireworks();
            }
            if (pageNum === 3) {
                createParticles();
            }
        }

        // ========== 下雨效果 ==========
        const rainCanvas = document.getElementById('rainCanvas');
        const rainCtx = rainCanvas.getContext('2d');

        function resizeRainCanvas() {
            rainCanvas.width = window.innerWidth;
            rainCanvas.height = window.innerHeight;
        }
        resizeRainCanvas();
        window.addEventListener('resize', resizeRainCanvas);

        class RainDrop {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * rainCanvas.width;
                this.y = Math.random() * -rainCanvas.height;
                this.length = Math.random() * 25 + 15;
                this.speed = Math.random() * 12 + 10;
                this.opacity = Math.random() * 0.25 + 0.1;
                this.width = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += 1;
                if (this.y > rainCanvas.height) this.reset();
            }
            draw() {
                rainCtx.beginPath();
                rainCtx.moveTo(this.x, this.y);
                rainCtx.lineTo(this.x + 2, this.y + this.length);
                rainCtx.strokeStyle = `rgba(180, 190, 210, ${this.opacity})`;
                rainCtx.lineWidth = this.width;
                rainCtx.lineCap = 'round';
                rainCtx.stroke();
            }
        }

        const rainDrops = [];
        for (let i = 0; i < 150; i++) {
            rainDrops.push(new RainDrop());
        }

        function animateRain() {
            rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
            rainDrops.forEach(drop => {
                drop.update();
                drop.draw();
            });
            requestAnimationFrame(animateRain);
        }
        animateRain();

        // ========== 漂浮粒子 ==========
        function createParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-10px';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // ========== 星空 ==========
        function createStars() {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.width = (Math.random() * 2 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // ========== 烟花效果（高性能锐化版） ==========
        const fireworkCanvas = document.getElementById('fireworkCanvas');
        const fwCtx = fireworkCanvas.getContext('2d');

        function resizeFireworkCanvas() {
            fireworkCanvas.width = window.innerWidth;
            fireworkCanvas.height = window.innerHeight;
        }
        resizeFireworkCanvas();
        window.addEventListener('resize', resizeFireworkCanvas);

        // 金色、红色、紫色系调色板（锐化版）
        const colorPalettes = {
            gold: ['#FFD700', '#FFA500', '#FFB347', '#FFE135', '#FFCC00'],
            red: ['#FF0000', '#FF4500', '#DC143C', '#FF3333', '#FF1744'],
            purple: ['#9C27B0', '#BA68C8', '#CE93D8', '#7B1FA2', '#E040FB']
        };

        function getRandomPalette() {
            const palettes = ['gold', 'red', 'purple'];
            return palettes[Math.floor(Math.random() * palettes.length)];
        }

        function getRandomColor(palette) {
            const colors = colorPalettes[palette];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 高性能粒子（无模糊，锐利）
        class FastParticle {
            constructor(x, y, angle, speed, color) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.gravity = 0.06;
                this.size = 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.fillStyle = this.color;
                fwCtx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }

        // 光束粒子（锐利拖尾）
        class BeamParticle {
            constructor(x, y, angle, speed, color, length) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.008;
                this.gravity = 0.05;
                this.length = length;
                this.angle = angle;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.strokeStyle = this.color;
                fwCtx.lineWidth = 2;
                fwCtx.lineCap = 'round';
                fwCtx.beginPath();
                fwCtx.moveTo(this.x, this.y);
                const endX = this.x - this.vx * this.length;
                const endY = this.y - this.vy * this.length;
                fwCtx.lineTo(endX, endY);
                fwCtx.stroke();
            }
        }

        // 余烬粒子
        class SparkParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 1 + 0.5;
                this.color = color;
                this.alpha = 0.8;
                this.decay = Math.random() * 0.008 + 0.004;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.02;
                this.alpha -= this.decay;
            }

            draw() {
                if (this.alpha <= 0) return;
                fwCtx.globalAlpha = this.alpha;
                fwCtx.fillStyle = this.color;
                fwCtx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // 烟花类（高性能版）
        class Firework {
            constructor() {
                this.x = Math.random() * fireworkCanvas.width * 0.7 + fireworkCanvas.width * 0.15;
                this.y = fireworkCanvas.height;
                this.targetY = Math.random() * (fireworkCanvas.height * 0.4) + fireworkCanvas.height * 0.1;
                this.speed = Math.random() * 4 + 8;
                this.palette = getRandomPalette();
                this.color = getRandomColor(this.palette);
                this.exploded = false;
                this.particles = [];
                this.sparks = [];
                this.trail = [];
                this.type = Math.floor(Math.random() * 5);
            }

            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > 15) this.trail.shift();
                    if (this.y <= this.targetY) this.explode();
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].alpha <= 0) this.particles.splice(i, 1);
                }

                for (let i = this.sparks.length - 1; i >= 0; i--) {
                    this.sparks[i].update();
                    if (this.sparks[i].alpha <= 0) this.sparks.splice(i, 1);
                }
            }

            explode() {
                this.exploded = true;
                const count = 100 + Math.floor(Math.random() * 50);

                switch(this.type) {
                    case 0: // 圆形放射
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = Math.random() * 5 + 4;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 4));
                        }
                        break;
                    case 1: // 空心
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 5 + Math.random();
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 5));
                        }
                        for (let i = 0; i < 20; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const speed = Math.random() * 2;
                            this.particles.push(new FastParticle(this.x, this.y, angle, speed, '#FFFFFF'));
                        }
                        break;
                    case 2: // 菊花型
                        for (let i = 0; i < count * 1.5; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 3 + Math.random() * 4;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 6));
                        }
                        break;
                    case 3: // 双层
                        for (let i = 0; i < count; i++) {
                            const angle = (Math.PI * 2 / count) * i;
                            const speed = 4 + Math.random() * 2;
                            this.particles.push(new FastParticle(this.x, this.y, angle, speed, getRandomColor(this.palette)));
                        }
                        setTimeout(() => {
                            for (let i = 0; i < count * 0.5; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const speed = Math.random() * 3 + 1;
                                this.particles.push(new FastParticle(this.x, this.y, angle, speed, getRandomColor(this.palette)));
                            }
                        }, 100);
                        break;
                    case 4: // 星芒
                        const arms = 5 + Math.floor(Math.random() * 3);
                        for (let i = 0; i < count * 2; i++) {
                            const arm = i % arms;
                            const angle = (Math.PI * 2 / arms) * arm + (Math.random() - 0.5) * 0.3;
                            const speed = 3 + Math.random() * 5;
                            this.particles.push(new BeamParticle(this.x, this.y, angle, speed, getRandomColor(this.palette), 5));
                        }
                        break;
                }

                // 添加余烬
                for (let i = 0; i < 40; i++) {
                    this.sparks.push(new SparkParticle(this.x, this.y, getRandomColor(this.palette)));
                }
            }

            draw() {
                // 上升尾迹（锐利）
                if (!this.exploded) {
                    fwCtx.globalAlpha = 0.9;
                    fwCtx.strokeStyle = this.color;
                    fwCtx.lineWidth = 2;
                    fwCtx.beginPath();
                    for (let i = 1; i < this.trail.length; i++) {
                        fwCtx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
                        fwCtx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    fwCtx.stroke();

                    fwCtx.globalAlpha = 1;
                    fwCtx.fillStyle = '#FFFFFF';
                    fwCtx.fillRect(this.x - 2, this.y - 2, 4, 4);
                }

                // 粒子
                this.particles.forEach(p => p.draw());
                this.sparks.forEach(s => s.draw());
            }

            isDone() {
                return this.exploded && this.particles.length === 0 && this.sparks.length === 0;
            }
        }

        let fireworks = [];
        let fireworkInterval = null;
        let animationId = null;

        function startFireworks() {
            fireworks = [];
            if (animationId) cancelAnimationFrame(animationId);
            if (fireworkInterval) clearInterval(fireworkInterval);

            // 初始爆发
            for (let i = 0; i < 4; i++) {
                setTimeout(() => fireworks.push(new Firework()), i * 200);
            }

            // 持续发射
            fireworkInterval = setInterval(() => {
                if (fireworks.length < 8) {
                    fireworks.push(new Firework());
                }
            }, 400);

            animateFireworks();
        }

        function animateFireworks() {
            fwCtx.globalAlpha = 0.15;
            fwCtx.fillStyle = '#0c0c1e';
            fwCtx.fillRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);
            fwCtx.globalAlpha = 1;

            fireworks.forEach(fw => {
                fw.update();
                fw.draw();
            });

            fireworks = fireworks.filter(fw => !fw.isDone());
            animationId = requestAnimationFrame(animateFireworks);
        }

        // ========== 音乐控制 ==========
        let musicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                musicBtn.textContent = '♪';
            } else {
                bgMusic.play().catch(e => console.log('音乐播放需要用户交互'));
                musicBtn.classList.add('playing');
                musicBtn.textContent = '♫';
            }
            musicPlaying = !musicPlaying;
        }

        // 页面加载后尝试播放
        document.addEventListener('click', function initMusic() {
            if (!musicPlaying) {
                bgMusic.play().then(() => {
                    musicPlaying = true;
                    musicBtn.classList.add('playing');
                    musicBtn.textContent = '♫';
                }).catch(() => {});
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });
    </script>
</body>
